<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Egibide Access Control{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-3 mb-4">
        <a class="navbar-brand" href="{% url 'control_accesos:panel' %}">
            <i class="bi bi-shield-lock-fill me-2"></i>Egibide Access Control
        </a>
        <div class="d-flex gap-3">
            <a href="{% url 'control_accesos:usuario_lista' %}" class="nav-link text-white">Usuarios</a>
            <a href="{% url 'control_accesos:zona_lista' %}" class="nav-link text-white">Zonas</a>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-success alert-dismissible fade show">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
