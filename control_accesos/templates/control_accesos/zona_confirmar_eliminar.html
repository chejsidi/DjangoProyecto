{% extends 'control_accesos/base.html' %}
{% block title %}Eliminar zona{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle me-2"></i>Confirmar eliminación
            </div>
            <div class="card-body">
                <p>¿Estás seguro de que quieres eliminar la zona <strong>{{ zona }}</strong>?</p>
                <p class="text-muted small">Se eliminarán también los permisos y registros asociados.</p>
                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Eliminar</button>
                    <a href="{% url 'control_accesos:zona_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
