{% extends 'control_accesos/base.html' %}

{% block title %}Eliminar usuario{% endblock %}

{% block content %}
<div class="card mx-auto" style="max-width: 500px; margin-top: 4rem;">
    <div class="card-body text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
        <h4 class="mt-3">¿Eliminar usuario?</h4>
        <p class="text-muted">{{ usuario.nombre }} {{ usuario.apellidos }} ({{ usuario.dni }})</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Sí, eliminar</button>
            <a href="{% url 'control_accesos:usuario_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
